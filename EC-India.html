<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>EC-India</title>
    
    <link rel="stylesheet" href="CSS/Style.css">
    <link rel="stylesheet" href="CSS/DeveloperOverview.css">
    <link rel="stylesheet" href="CSS/Loading.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@25,250,1,100" />

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#017FD9">
    <link rel="apple-touch-icon" href="Assets/Icons/Logo.png">
</head>

<body>
    
    <div class="APP_LAYOUT">
        
        <header class="APP_HEADER">
            <h1>EC-India</h1>
            <button id="DEV_OVERVIEW" class="DEV">Developer's Overview</button>
        </header>

        <div class="TABS">
            <button class="TABS_SWITCH ACTIVE" Data-Tabs="Calls">Calls</button>
            <button class="TABS_SWITCH" Data-Tabs="Chats">Chats</button>
        </div>

        <main id="CONTACT_PANEL" class="CONTENTS FADE_IN"></main>

        <footer class="SEARCH">
            <div class="SEARCH_BAR">
                <span class="material-symbols-outlined SEARCH_ICON">Search</span>
                <input type="text" id="SEARCH_QUERY" placeholder="Search" autocomplete="off">
                <span class="material-symbols-outlined CLOSE_ICON" id="SEARCH_CLEAR">Close</span>
            </div>
        </footer>
        
    </div>

    <div id="DEV_OVERLAY" class="OVERLAY_CONTAINER">
        <div class="OVERLAY_CONTENT">
            
            <div class="WINDOW_TITLE_BAR">
                <span class="WINDOW_TITLE">Developer's Overview</span>
                <button class="WINDOW_CLOSE" id="DEV_OVERLAY_CLOSE">✕</button>
            </div>
            
            <div class="DEV_INFO">
                <p class="DEV_DETAIL"><strong>Application Version:</strong> 1.0.0</p>
                <p class="DEV_DETAIL"><strong>Designer & Developer:</strong> Satish Kumar Singh</p>
                
                <div class="LINKS">
                    <a href="https://www.github.com/Satyeshvara" target="_blank">GitHub</a>
                </div>
            </div>
            
        </div>
    </div>

    <template id="CONTACT_CARD">
        <div class="SINGLE_CONTACT_CARD">
            
            <div class="INFO_DATA">
                <h3 class="CONTACT_NAME"></h3>
                <p class="CONTACT_NUMBER"></p>
            </div>
            
            <a href="" class="CALL">
                <span class="material-symbols-outlined CALL_ICON">Call</span>
                <span class="WHATSAPP_ICON"></span>
            </a>
            
        </div>
    </template>

    <script type="module" src="JS/Script.js"></script>

</body>

</html>
